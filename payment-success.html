<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
</head>
<body>

    <h1>Payment Successful</h1>

    <p id="message">
        Verifying payment...
    </p>

    <script>

        const params =
            new URLSearchParams(
                window.location.search
            );

        const token =
            params.get("token");

        document.getElementById(
            "message"
        ).textContent =
            "PayPal returned token: " +
            token;

    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
</head>
<body>

    <h1>Payment Successful</h1>

    <p id="message">
        Verifying payment...
    </p>

    <script>

        verifyPayment();

        async function verifyPayment() {

            const params =
                new URLSearchParams(
                    window.location.search
                );

            const token =
                params.get(
                    "token"
                );

            const bookingEmail =
                localStorage.getItem(
                    "booking_email"
                );

            const response =
                await fetch(
                    "https://vnpxxetojolmgtzrqeuy.supabase.co/functions/v1/paypal-success",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json"
                        },
                        body:
                            JSON.stringify({
                                token:
                                    token,
                                email:
                                    bookingEmail
                            })
                    }
                );

            const data =
                await response.json();

            document.getElementById(

    "message"

).textContent =

    "Payment received successfully. Your booking has been created.";
        }

    </script>

</body>
</html>
